{% extends 'main/dashboard.html' %}

{% block content %}
    <div class="px-4 py-4">
        <div>
            <h2 class="text-gray-600 text-sm font-medium">SEND MESSAGE</h2>
            <form action="" method="POST" class="*:block *:my-3">
                {% csrf_token %}
                <label class="text-gray-600">Phone Number</label>
                <input type="tel" name="phone-number" class="outline-none border border-gray-400 rounded px-3 py-2 text-gray-700 placeholder:text-sm text-[.95em] w-1/3" placeholder="+256702304564" disabled>
                <label class="text-gray-600">Message</label>
                <textarea name="message" class="border rounded border-gray-400 text-gray-700 outline-none w-1/3 h-36 p-2"></textarea>
                <button class="bg-blue-500 text-white px-4 py-1.5 rounded">Send</button>
            </form>
        </div>
    </div>
{% endblock %}
